<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>FinanceTracker Quick Categorization</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 1280px; height: 800px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
  }
  .app-wrapper { display: flex; width: 1280px; height: 800px; }

  /* Sidebar */
  .sidebar {
    width: 220px; min-width: 220px;
    background: #1a1a2e;
    color: #fff;
    display: flex; flex-direction: column;
    padding: 0;
    height: 800px;
  }
  .sidebar-logo {
    padding: 22px 20px 18px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.3px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .sidebar-logo .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #4ade80, #22d3ee);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; color: #1a1a2e;
  }
  .sidebar-nav { flex: 1; padding: 12px 0; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px;
    color: rgba(255,255,255,0.55);
    font-size: 13.5px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    text-decoration: none;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.04); }
  .nav-item.active {
    color: #fff;
    background: rgba(74, 222, 128, 0.1);
    border-left-color: #4ade80;
  }
  .nav-item i { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; gap: 8px;
    color: rgba(255,255,255,0.45);
    font-size: 12.5px;
  }
  .sidebar-footer i { font-size: 14px; }

  /* Main content */
  .main-content {
    flex: 1;
    padding: 24px 28px;
    overflow: hidden;
    background: #f0f2f5;
    display: flex;
    flex-direction: column;
  }
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .page-title {
    font-size: 22px; font-weight: 700; color: #1a1a2e;
    margin: 0;
  }
  .remaining-badge {
    font-size: 13px; font-weight: 600;
    color: #d97706;
    background: #fef3c7;
    padding: 5px 14px;
    border-radius: 20px;
  }

  /* Transaction card */
  .txn-card {
    background: #fff;
    border-radius: 14px;
    padding: 28px 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border: 1px solid rgba(0,0,0,0.05);
    max-width: 620px;
    margin: 0 auto 24px;
    width: 100%;
  }
  .txn-amount {
    font-size: 32px; font-weight: 800; color: #dc2626;
    text-align: center; margin-bottom: 6px;
  }
  .txn-date {
    text-align: center; font-size: 13px; color: #9ca3af;
    margin-bottom: 18px; font-weight: 500;
  }
  .txn-detail-row {
    display: flex; justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #f3f4f6;
    font-size: 14px;
  }
  .txn-detail-row:last-child { border-bottom: none; }
  .txn-detail-label { color: #6b7280; font-weight: 500; }
  .txn-detail-value { color: #1a1a2e; font-weight: 600; }

  /* Category grid */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 620px;
    margin: 0 auto 20px;
    width: 100%;
  }
  .cat-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    background: #fff;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    font-size: 13.5px; font-weight: 600;
    color: #374151;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat-btn:hover {
    border-color: #4ade80;
    background: rgba(74,222,128,0.05);
  }
  .cat-key {
    width: 26px; height: 26px;
    background: #f3f4f6;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: #6b7280;
    flex-shrink: 0;
  }
  .cat-dot-sm {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  /* Bottom bar */
  .bottom-bar {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 620px;
    margin: 0 auto;
    width: 100%;
  }
  .hint-text {
    font-size: 12.5px; color: #9ca3af; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .hint-text kbd {
    background: #f3f4f6; border: 1px solid #e5e7eb;
    border-radius: 4px; padding: 1px 6px;
    font-size: 11px; font-weight: 700; color: #6b7280;
  }
</style>
</head>
<body>
<div class="app-wrapper">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">FT</div>
      <span>FinanceTracker</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
      <a class="nav-item"><i class="bi bi-bank"></i> Accounts</a>
      <a class="nav-item"><i class="bi bi-arrow-left-right"></i> Transactions</a>
      <a class="nav-item active"><i class="bi bi-eraser"></i> Clear</a>
      <a class="nav-item"><i class="bi bi-tags"></i> Categories</a>
      <a class="nav-item"><i class="bi bi-lightning"></i> Rules</a>
      <a class="nav-item"><i class="bi bi-pie-chart"></i> Budgets</a>
      <a class="nav-item"><i class="bi bi-bar-chart-line"></i> Reports</a>
      <a class="nav-item"><i class="bi bi-upload"></i> Import CSV</a>
    </nav>
    <div class="sidebar-footer">
      <i class="bi bi-globe2"></i> English
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <div class="page-header">
      <div class="page-title">Quick Categorization</div>
      <span class="remaining-badge"><i class="bi bi-lightning-fill me-1"></i> 3 / 15 remaining</span>
    </div>

    <!-- Transaction card -->
    <div class="txn-card">
      <div class="txn-amount">-$67.89</div>
      <div class="txn-date">Mar 22, 2026</div>
      <div class="txn-detail-row">
        <span class="txn-detail-label">Description</span>
        <span class="txn-detail-value">AMZN MKTP US*2K47J3</span>
      </div>
      <div class="txn-detail-row">
        <span class="txn-detail-label">Payee</span>
        <span class="txn-detail-value">Amazon</span>
      </div>
      <div class="txn-detail-row">
        <span class="txn-detail-label">Account</span>
        <span class="txn-detail-value">Checking Account</span>
      </div>
    </div>

    <!-- Category buttons -->
    <div class="cat-grid">
      <button class="cat-btn"><span class="cat-key">1</span><span class="cat-dot-sm" style="background:#3b82f6"></span> Housing</button>
      <button class="cat-btn"><span class="cat-key">2</span><span class="cat-dot-sm" style="background:#22c55e"></span> Groceries</button>
      <button class="cat-btn"><span class="cat-key">3</span><span class="cat-dot-sm" style="background:#8b5cf6"></span> Transportation</button>
      <button class="cat-btn"><span class="cat-key">4</span><span class="cat-dot-sm" style="background:#06b6d4"></span> Utilities</button>
      <button class="cat-btn"><span class="cat-key">5</span><span class="cat-dot-sm" style="background:#f97316"></span> Dining Out</button>
      <button class="cat-btn"><span class="cat-key">6</span><span class="cat-dot-sm" style="background:#ec4899"></span> Entertainment</button>
      <button class="cat-btn"><span class="cat-key">7</span><span class="cat-dot-sm" style="background:#14b8a6"></span> Healthcare</button>
      <button class="cat-btn"><span class="cat-key">8</span><span class="cat-dot-sm" style="background:#eab308"></span> Shopping</button>
      <button class="cat-btn"><span class="cat-key">9</span><span class="cat-dot-sm" style="background:#64748b"></span> Insurance</button>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <div class="hint-text">
        <i class="bi bi-keyboard"></i> Press <kbd>1</kbd>-<kbd>9</kbd> to categorize instantly
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-outline-secondary btn-sm" style="font-size:12.5px; padding:5px 16px; border-radius:8px;">
          <i class="bi bi-arrow-left me-1"></i> Previous
        </button>
        <button class="btn btn-outline-secondary btn-sm" style="font-size:12.5px; padding:5px 16px; border-radius:8px;">
          Skip <i class="bi bi-arrow-right ms-1"></i>
        </button>
      </div>
    </div>
  </main>
</div>
</body>
</html>
